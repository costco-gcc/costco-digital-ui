name: Sync Talent500 openings

on:
  schedule:
    # Daily at 03:30 UTC (~09:00 IST). Adjust as needed.
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-openings
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to push back a commit cleanly.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync openings from Talent500 API
        id: scrape
        run: npm run sync:openings

      - name: Commit if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if git diff --quiet -- public/openings.json; then
            echo "No changes to openings.json — skipping commit."
            exit 0
          fi
          COUNT=$(node -e "const j=require('./public/openings.json');console.log(Array.isArray(j.openings)?j.openings.length:0)")
          git add public/openings.json
          git commit -m "chore(openings): sync Talent500 — ${COUNT} roles"
          git push

      - name: File an issue on failure
        # Fires only if an earlier step failed. De-duplicates by searching for
        # an existing open issue with our marker label; comments instead of
        # spamming a new issue every day the API is down.
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'talent500-sync-failure';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });
            const body = `Talent500 sync failed in run [${process.env.GITHUB_RUN_ID}](${runUrl}).\n\nCheck the workflow logs for the failure reason. Common causes: API schema change (>50% rows dropped), zero rows returned, or network error.`;
            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Talent500 sync is failing',
                body,
                labels: [label, 'bug'],
              });
            }
