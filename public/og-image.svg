<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="55%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#FFE9C9"/>
    </linearGradient>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E31837" stop-opacity="0.32"/>
      <stop offset="70%" stop-color="#E31837" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#005DAA" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#005DAA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E31837"/>
      <stop offset="60%" stop-color="#005DAA"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>

  <!-- Background and brand glows -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="540" r="320" fill="url(#glowRed)"/>
  <circle cx="120"  cy="120" r="280" fill="url(#glowBlue)"/>

  <!-- Eyebrow: pin dot + uppercase label -->
  <g transform="translate(88 96)">
    <circle cx="6" cy="0" r="6" fill="#E31837"/>
    <circle cx="6" cy="0" r="11" fill="#E31837" fill-opacity="0.18"/>
    <text x="32" y="6"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="22" font-weight="700" letter-spacing="4"
          fill="#4B5563">COSTCO INDIA · GLOBAL CAPABILITY CENTER</text>
  </g>

  <!-- Headline -->
  <g transform="translate(88 240)">
    <text x="0" y="0"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="96" font-weight="900" letter-spacing="-2"
          fill="#0B0F1A">Powering Costco worldwide,</text>
    <text x="0" y="110"
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="96" font-weight="900" letter-spacing="-2"
          fill="url(#accent)">from Hyderabad.</text>
  </g>

  <!-- Pillar strip -->
  <g transform="translate(88 470)"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
     font-size="26" fill="#4B5563">
    <text x="0"   y="0">People</text>
    <text x="125" y="0" fill-opacity="0.4">·</text>
    <text x="160" y="0">Technology</text>
    <text x="345" y="0" fill-opacity="0.4">·</text>
    <text x="380" y="0">Process</text>
  </g>

  <!-- Footer strip: campus + url -->
  <g transform="translate(88 568)"
     font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
     font-size="22">
    <text x="0" y="0" font-weight="600" fill="#0B0F1A">Capitaland, Madhapur — Hyderabad</text>
    <text x="1024" y="0" text-anchor="end" fill="#4B5563" transform="translate(0 0)">www.costcodigital.com</text>
  </g>
</svg>
